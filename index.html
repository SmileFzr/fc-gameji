<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC 游戏机 - 童年经典在线玩</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/crt-effect.css">
  <link rel="stylesheet" href="css/gamepad.css">
  <link rel="stylesheet" href="css/save-manager.css">
  <link rel="stylesheet" href="css/keymap-config.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>

  <!-- 背景粒子动画 -->
  <div class="bg-particles" id="bgParticles"></div>

  <!-- 主容器 -->
  <div class="fc-console" id="fcConsole">
    
    <!-- 顶部标题栏 -->
    <div class="console-header">
      <div class="header-left">
        <span class="brand-badge">FAMILY COMPUTER</span>
      </div>
      <div class="header-center">
        <h1 class="console-title">FC 游戏机</h1>
        <p class="console-subtitle">童年经典 · 在线重温</p>
      </div>
      <div class="header-right">
        <span class="power-led" id="powerLed"></span>
        <span class="power-text">POWER</span>
      </div>
    </div>

    <!-- 主体区域 -->
    <div class="console-body">
      
      <!-- 游戏画面区域 -->
      <div class="screen-section">
        <div class="screen-bezel">
          <div class="screen-container" id="screenContainer">
            <!-- CRT扫描线叠加层 -->
            <div class="crt-overlay" id="crtOverlay"></div>
            <!-- 游戏Canvas -->
            <canvas id="gameCanvas" width="256" height="240"></canvas>
            <!-- 无ROM时的提示 -->
            <div class="screen-placeholder" id="screenPlaceholder">
              <div class="placeholder-content">
                <div class="placeholder-icon">🎮</div>
                <h2>FC 游戏机</h2>
                <p>加载 NES 游戏 ROM 开始游玩</p>
                <div class="placeholder-actions">
                  <button class="btn btn-primary" id="btnLoadROM">
                    <span class="btn-icon">📂</span> 打开 ROM 文件
                  </button>
                  <p class="placeholder-hint">或将 .nes 文件拖拽到此区域</p>
                </div>
              </div>
            </div>
          </div>
          <!-- 屏幕下方标签 -->
          <div class="screen-label">
            <span class="label-badge" id="gameTitle">未加载游戏</span>
            <span class="label-fps" id="fpsDisplay" style="display:none;">60 FPS</span>
          </div>
        </div>
      </div>

      <!-- 右侧控制面板 -->
      <div class="control-section">
        
        <!-- 控制按钮组 -->
        <div class="control-panel">
          <div class="panel-section">
            <h3 class="panel-title">游戏控制</h3>
            <div class="button-grid">
              <button class="ctrl-btn" id="btnLoad" title="加载ROM">
                <span class="ctrl-icon">📂</span>
                <span>加载</span>
              </button>
              <button class="ctrl-btn" id="btnPause" title="暂停/继续" disabled>
                <span class="ctrl-icon">⏯️</span>
                <span>暂停</span>
              </button>
              <button class="ctrl-btn" id="btnReset" title="重置游戏" disabled>
                <span class="ctrl-icon">🔄</span>
                <span>重置</span>
              </button>
              <button class="ctrl-btn" id="btnFullscreen" title="全屏模式">
                <span class="ctrl-icon">🖥️</span>
                <span>全屏</span>
              </button>
            </div>
          </div>

          <div class="panel-section">
            <h3 class="panel-title">存档管理</h3>
            <div class="button-grid">
              <button class="ctrl-btn save-btn" id="btnQuickSave" title="快速存档 (F5)" disabled>
                <span class="ctrl-icon">💾</span>
                <span>存档</span>
              </button>
              <button class="ctrl-btn save-btn" id="btnQuickLoad" title="快速读档 (F7)" disabled>
                <span class="ctrl-icon">📥</span>
                <span>读档</span>
              </button>
              <button class="ctrl-btn" id="btnSaveManager" title="管理存档槽位" disabled>
                <span class="ctrl-icon">📋</span>
                <span>槽位</span>
              </button>
              <button class="ctrl-btn" id="btnExportSave" title="导出存档" disabled>
                <span class="ctrl-icon">📤</span>
                <span>导出</span>
              </button>
            </div>
          </div>

          <div class="panel-section">
            <h3 class="panel-title">显示设置</h3>
            <div class="settings-row">
              <label class="toggle-label">
                <input type="checkbox" id="toggleCRT" checked>
                <span class="toggle-switch"></span>
                CRT效果
              </label>
              <label class="toggle-label">
                <input type="checkbox" id="toggleScanlines" checked>
                <span class="toggle-switch"></span>
                扫描线
              </label>
            </div>
            <div class="settings-row">
              <label class="slider-label">
                <span>画面比例</span>
                <select id="selectScale" class="scale-select">
                  <option value="2">2x</option>
                  <option value="2.5" selected>2.5x</option>
                  <option value="3">3x</option>
                  <option value="3.5">3.5x</option>
                </select>
              </label>
            </div>
          </div>
        </div>

        <!-- 按键说明 -->
        <div class="keymap-panel">
          <div class="keymap-panel-header">
            <h3 class="panel-title">按键映射</h3>
            <button class="keymap-edit-btn" id="btnEditKeymap" title="自定义按键">✏️</button>
          </div>
          <div class="keymap-grid" id="keymapDisplay">
            <!-- JS动态生成 -->
            <div class="keymap-item">
              <kbd>↑↓←→</kbd><span>方向键</span>
            </div>
            <div class="keymap-item">
              <kbd>Z</kbd><span>A键</span>
            </div>
            <div class="keymap-item">
              <kbd>X</kbd><span>B键</span>
            </div>
            <div class="keymap-item">
              <kbd>Enter</kbd><span>Start</span>
            </div>
            <div class="keymap-item">
              <kbd>Shift</kbd><span>Select</span>
            </div>
            <div class="keymap-item">
              <kbd>F5</kbd><span>存档</span>
            </div>
            <div class="keymap-item">
              <kbd>F7</kbd><span>读档</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="console-footer">
      <span>❤️ 怀念童年 · FC游戏机 · 在线模拟器</span>
      <span class="footer-divider">|</span>
      <span id="statusText">就绪 - 请加载NES游戏文件</span>
    </div>
  </div>

  <!-- 存档管理弹窗 -->
  <div class="modal-overlay" id="saveModal">
    <div class="modal save-manager-modal">
      <div class="modal-header">
        <h2>📋 存档管理</h2>
        <button class="modal-close" id="btnCloseSaveModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="save-slots" id="saveSlots">
          <!-- JS动态生成 -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnImportSave">📥 导入存档</button>
        <button class="btn btn-secondary" id="btnCloseSaveModal2">关闭</button>
      </div>
    </div>
  </div>

  <!-- 按键自定义弹窗 -->
  <div class="modal-overlay" id="keymapModal">
    <div class="modal keymap-modal">
      <div class="modal-header">
        <h2>🎮 自定义按键</h2>
        <button class="modal-close" id="btnCloseKeymapModal">✕</button>
      </div>
      <div class="modal-body">
        <p class="keymap-hint">点击下方按钮，然后按下你想设置的按键</p>
        <div class="keymap-config" id="keymapConfig">
          <!-- JS动态生成 -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnResetKeymap">↺ 恢复默认</button>
        <button class="btn btn-secondary" id="btnCloseKeymapModal2">关闭</button>
      </div>
    </div>
  </div>

  <!-- Toast通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept=".nes" style="display:none">

  <!-- 存档导入隐藏输入 -->
  <input type="file" id="saveImportInput" accept=".json" style="display:none">

  <!-- JSNES 库 (CDN优先，本地fallback) -->
  <script src="https://unpkg.com/jsnes@1.2.1/dist/jsnes.min.js"></script>
  <script>
    if (typeof jsnes === 'undefined') {
      document.write('<script src="lib/jsnes.min.js"><\/script>');
    }
  </script>

  <!-- 应用脚本 -->
  <script src="js/romLoader.js"></script>
  <script src="js/emulator.js"></script>
  <script src="js/saveManager.js"></script>
  <script src="js/controller.js"></script>
  <script src="js/uiManager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
